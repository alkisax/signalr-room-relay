<!-- backend-dotnet\wwwroot\test-morse.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>MorseHub Test</title>

    <!-- official signalr browser client -->
    <!-- φέρνουμε το SignalR browser library -->
    <!-- χωρίς αυτό δεν υπάρχει HubConnectionBuilder -->
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      input,
      button {
        padding: 8px;
        margin: 4px;
      }

      #messages {
        margin-top: 20px;
        border: 1px solid #ccc;
        padding: 12px;
        min-height: 240px;
      }

      .message {
        background: #f1f1f1;
        margin-bottom: 8px;
        padding: 8px;
      }
    </style>
  </head>

  <body>
    <h1>MorseHub Test</h1>

    <div>
      <button id="connectBtn">
        Connect
      </button>

      <button id="disconnectBtn">
        Disconnect
      </button>
    </div>

    <div>
      <input
        id="roomInput"
        value="abc"
      />

      <button id="joinRoomBtn">
        Join Room
      </button>

      <span>
        Room users:
        <strong id="roomUsers">
          0
        </strong>
      </span>
    </div>

    <div>
      <button id="sendMorseBtn">
        Send Morse
      </button>
    </div>

    <div id="messages"></div>

    <script>
      const messagesDiv =
        document.getElementById('messages');

      const roomUsersSpan =
        document.getElementById('roomUsers');

      const addMessage = (text) => {
        const div =
          document.createElement('div');

        div.className = 'message';
        div.textContent = text;

        messagesDiv.prepend(div);
      };

      // δημιουργία realtime signalr connection object
      // HubConnectionBuilder → builder pattern class του SignalR
      // χρειάζεται για websocket/realtime connection
      const connection =
        new signalR.HubConnectionBuilder()

          // δηλώνουμε σε ποιο hub endpoint θα συνδεθεί ο client
          // πρέπει να ταιριάζει με app.MapHub<MorseHub>("/morse")
          .withUrl('/morse')

          // automatic reconnect αν πέσει internet/socket
          // αλλιώς το connection μένει dead
          .withAutomaticReconnect()

          // κάνει build/finalize το connection object
          .build();

      // backend → frontend realtime event listener
      // connection.on(eventName)
      // ακούει realtime event απο το backend
      connection.on(
        'RoomUsers',
        (count) => {

          roomUsersSpan.textContent =
            count;

          addMessage(
            `👥 room users: ${count}`
          );
        }
      );

      // realtime listener για ReceiveMorse event
      // event name πρέπει να ταιριάζει backend/frontend
      connection.on(
        'ReceiveMorse',
        (payload) => {

          addMessage(
            `📥 morse: ${payload.translatedText}`
          );

          addMessage(
            `📥 letters: ${payload.morseLetters.join(' ')}`
          );
        }
      );

      // lifecycle reconnect event
      // SignalR event όταν προσπαθεί reconnect
      connection.onreconnecting(() => {

        addMessage(
          '🟡 reconnecting...'
        );
      });

      // lifecycle reconnect success event
      // SignalR event όταν reconnect ολοκληρωθεί
      connection.onreconnected(() => {

        addMessage(
          '🟢 reconnected'
        );
      });

      // lifecycle disconnect event
      // SignalR event όταν κλείσει τελείως το socket
      connection.onclose(() => {

        roomUsersSpan.textContent = '0';

        addMessage(
          '🔴 disconnected'
        );
      });

      document
        .getElementById('connectBtn')
        .addEventListener(
          'click',
          async () => {

            try {

              // ανοίγει realtime websocket connection
              // χωρίς start() δεν υπάρχει socket
              await connection.start();

              addMessage(
                '🟢 connected'
              );

            } catch (err) {

              console.log(err);

              addMessage(
                `❌ connect error: ${err.message}`
              );
            }
          }
        );

      document
        .getElementById('disconnectBtn')
        .addEventListener(
          'click',
          async () => {

            try {

              // κλείνει realtime connection
              // triggerάρει backend disconnect lifecycle
              await connection.stop();

            } catch (err) {

              console.log(err);
            }
          }
        );

      document
        .getElementById('joinRoomBtn')
        .addEventListener(
          'click',
          async () => {

            try {

              const roomId =
                document.getElementById(
                  'roomInput'
                ).value;

              // invoke(methodName, ...)
              // καλεί realtime backend hub method
              await connection.invoke(
                'JoinRoom',
                roomId
              );

              addMessage(
                `🫂 joined room: ${roomId}`
              );

            } catch (err) {

              console.log(err);

              addMessage(
                `❌ join error: ${err.message}`
              );
            }
          }
        );

      document
        .getElementById('sendMorseBtn')
        .addEventListener(
          'click',
          async () => {

            try {

              const roomId =
                document.getElementById(
                  'roomInput'
                ).value;

              // payload object που θα σταλεί realtime
              // shape πρέπει να ταιριάζει με MorsePayloadDto
              const payload = {
                roomId,
                morseLetters: [
                  '.-',
                  '-...'
                ],
                translatedText: 'AB'
              };

              // realtime backend method call
              // payload γίνεται automatic JSON serialization
              await connection.invoke(
                'SendMorse',
                payload
              );

              addMessage(
                `📡 morse payload sent`
              );

            } catch (err) {

              console.log(err);

              addMessage(
                `❌ send error: ${err.message}`
              );
            }
          }
        );
    </script>
  </body>
</html>
